name: trigger-ghidrai-api

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch upstream push to ghidrai-api
        env:
          DISPATCH_TOKEN: ${{ secrets.GHIDRAI_API_DISPATCH_TOKEN }}
          TARGET_REPO: tensorlabresearch/ghidrai-api
          SOURCE_REPO: ${{ github.repository }}
          SOURCE_REF: ${{ github.ref }}
          SOURCE_BRANCH: ${{ github.ref_name }}
          SOURCE_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [[ -z "${DISPATCH_TOKEN}" ]]; then
            echo "GHIDRAI_API_DISPATCH_TOKEN is not set." >&2
            exit 1
          fi

          curl -fsSL \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${DISPATCH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${TARGET_REPO}/dispatches" \
            -d @- <<JSON
          {
            "event_type": "ghidrai-upstream-push",
            "client_payload": {
              "upstream_repo": "${SOURCE_REPO}",
              "upstream_ref": "${SOURCE_REF}",
              "upstream_branch": "${SOURCE_BRANCH}",
              "upstream_sha": "${SOURCE_SHA}"
            }
          }
          JSON
