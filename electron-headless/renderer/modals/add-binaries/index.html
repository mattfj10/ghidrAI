<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Add Binaries</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <h3>Add Binaries to Project</h3>
    <p class="description">
      Optional: add files to import into the project. Leave empty to create an empty project.
    </p>
    <div class="binary-list" id="list">
      <div class="empty-msg" id="emptyMsg">No binaries added yet</div>
    </div>
    <div class="buttons">
      <button class="cancel" id="cancel" type="button">Cancel</button>
      <button class="add" id="add" type="button">Add Files</button>
      <button class="create" id="create" type="button">Create Project</button>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
