<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ghidra Headless Project Home</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="backdrop"></div>
    <header class="topbar">
      <div>
        <p class="eyebrow">Headless Backend</p>
        <h1>Projects</h1>
      </div>
      <div id="health" class="status-pill"></div>
    </header>

    <main class="layout">
      <div class="action-bar">
        <button id="createProjectBtn" type="button">New Project</button>
        <button id="openProjectBtn" type="button" class="ghost">Open Existing</button>
        <p id="formMessage" class="form-message" aria-live="polite"></p>
      </div>

      <div id="projectsList" class="project-list"></div>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
