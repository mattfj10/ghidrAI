<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Code Browser</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        background: #0a0a0a;
        color: #e0e0e0;
        margin: 0;
        padding: 16px;
      }
      h1 {
        font-size: 16px;
        margin: 0 0 12px;
        font-weight: 500;
      }
      pre {
        white-space: pre-wrap;
        word-break: break-word;
        background: #161616;
        border: 1px solid #2a2a2a;
        border-radius: 4px;
        padding: 12px;
        font-size: 12px;
        line-height: 1.4;
      }
      .error {
        color: #ffb8c9;
      }
    </style>
  </head>
  <body>
    <h1 id="title">Disassembly</h1>
    <pre id="output">Loading…</pre>
    <script src="./code-browser.js"></script>
  </body>
</html>
